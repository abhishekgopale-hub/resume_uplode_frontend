name: Deploy Upload Frontend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Upload Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/resume_uplode_frontend

            git pull origin main

            npm install

            npm run build

            sudo rm -rf /var/www/upload/*

            sudo cp -r build/* /var/www/upload/

            sudo systemctl restart nginx